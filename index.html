<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Lock Rivals 3D - Online</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #05070a; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <script src="game.js"></script>

    <script>
        const socket = io();
        const otherPlayers = {};

        // HÀM TẠO ĐỐI THỦ: Copy 100% cơ thể của bro nhưng sửa tóc
        function spawnOpponent(playerInfo) {
            let myCharacter = typeof player !== 'undefined' ? player : (typeof myPlayer !== 'undefined' ? myPlayer : null);
            let opponentMesh;

            if (myCharacter) {
                // LỆNH THẦN THÁNH: Copy y chang toàn bộ hình dáng, quần áo, tay chân của bro
                opponentMesh = myCharacter.clone();
                
                // Duyệt qua từng bộ phận trên cơ thể vừa clone để tìm phần TÓC
                opponentMesh.traverse((child) => {
                    // Mẹo: Check xem bộ phận đó có tên là 'hair', 'toc', hoặc bro tự mò trong code xem đặt tên gì nhé
                    if (child.name && (child.name.toLowerCase().includes('hair') || child.name.toLowerCase().includes('toc'))) {
                        
                        // 🔥 THAY ĐỔI KIỂU TÓC TẠI ĐÂY:
                        // Ví dụ: Đổi sang kiểu tóc vuốt nhọn (Hình nón - ConeGeometry) phong cách Barou/Rin
                        // Bán kính 0.5, chiều cao 0.9
                        child.geometry = new THREE.ConeGeometry(0.5, 0.9, 4); 
                        
                        // 🔥 THAY ĐỔI MÀU TÓC ĐỐI THỦ ĐỂ DỄ NHẬN BIẾT:
                        // Ví dụ: Đổi sang màu đỏ rực hoặc vàng cam cho ngầu
                        if (child.material) {
                            child.material = new THREE.MeshBasicMaterial({ color: 0xff3300 }); 
                        }
                    }
                });
            } else {
                // Phương án dự phòng nếu lúc vào trận nhân vật gốc chưa kịp load
                const geometry = new THREE.BoxGeometry(1, 2, 1);
                const material = new THREE.MeshBasicMaterial({ color: 0xff0000 });
                opponentMesh = new THREE.Mesh(geometry, material);
            }

            // Đặt đối thủ vào vị trí server cấp
            opponentMesh.position.set(playerInfo.x, playerInfo.y, playerInfo.z);
            
            if (window.scene) window.scene.add(opponentMesh);
            return opponentMesh;
        }

        // --- MẠNG ĐỒNG BỘ GIỮ NGUYÊN ---
        socket.on('currentPlayers', (players) => {
            Object.keys(players).forEach((id) => {
                if (id !== socket.id) {
                    otherPlayers[id] = spawnOpponent(players[id]);
                }
            });
        });

        socket.on('newPlayer', (data) => {
            otherPlayers[data.id] = spawnOpponent(data.playerInfo);
        });

        socket.on('playerMoved', (data) => {
            if (otherPlayers[data.id]) {
                otherPlayers[data.id].position.set(data.position.x, data.position.y, data.position.z);
            }
        });

        socket.on('playerDisconnected', (id) => {
            if (otherPlayers[id]) {
                if (window.scene) window.scene.remove(otherPlayers[id]);
                delete otherPlayers[id];
            }
        });

        // Gửi tọa độ lên server mỗi 0.05 giây
        setInterval(() => {
            let myCharacter = typeof player !== 'undefined' ? player : (typeof myPlayer !== 'undefined' ? myPlayer : null);
            if (myCharacter && myCharacter.position) {
                socket.emit('playerMovement', { 
                    x: myCharacter.position.x, 
                    y: myCharacter.position.y, 
                    z: myCharacter.position.z 
                });
            }
        }, 50);
    </script>

</body>
</html>
